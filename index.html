<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COLORFUL MODX V18 - FINAL</title>
<style>
:root {
  --neon-green: #00ff88;
  --panel-bg: rgba(15, 15, 25, 0.92);
  --success: #00ff95;
  --error: #ff3131;
  --gold: #ffd700;
}
* { 
    margin: 0; padding: 0; box-sizing: border-box; 
    font-family: 'Segoe UI', system-ui, sans-serif; 
    user-select: none; -webkit-tap-highlight-color: transparent;
}
html, body { 
    width: 100%; height: 100dvh;
    background: #000; overflow: hidden; 
    position: fixed;
}

/* Game Background */
.game-background {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none; z-index: 1;
}

/* Rounded Corner Panel */
.signal-overlay {
  position: fixed; top: 12%; right: 15px; width: 240px; 
  background: var(--panel-bg); 
  border: 2px solid;
  border-image: linear-gradient(135deg, #00ff88, #0077ff, #ff0077) 1;
  border-radius: 24px; /* कोनों को गोलाकार किया गया */
  padding: 12px; z-index: 9999;
  box-shadow: 0 10px 35px rgba(0,0,0,0.7), 0 0 15px rgba(0, 255, 136, 0.3); 
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  will-change: transform; touch-action: none;
  overflow: hidden; /* गोलाकार कोनों को सुचारू रखने के लिए */
}

.overlay-header {
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px dashed rgba(255, 255, 255, 0.2); padding-bottom: 8px; margin-bottom: 10px;
}
.overlay-header h3 { 
  color: #fff; font-size: 12px; font-weight: 900; letter-spacing: 1px;
  text-shadow: 0 0 8px var(--neon-green);
}

.control-btn {
  background: linear-gradient(135deg, #ff3131, #ff0055); border: none; color: #fff;
  font-size: 9px; padding: 3px 8px; border-radius: 20px; cursor: pointer;
  font-weight: bold; box-shadow: 0 0 5px rgba(255,49,49,0.5);
}

.current-signal { text-align: center; margin-bottom: 8px; }
.p-id { font-size: 11px; color: #00e1ff; margin-bottom: 4px; font-weight: bold; }
.signal-value { font-size: 32px; font-weight: 900; margin: 2px 0; letter-spacing: 1px; }

.level-badge {
    font-size: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--neon-green);
    color: var(--neon-green); padding: 2px 10px; border-radius: 20px; font-weight: 800;
    margin-bottom: 6px; display: inline-block;
}
.level-safe { color: var(--success); border-color: var(--success); box-shadow: 0 0 8px rgba(0,255,149,0.4); }
.level-risky { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px rgba(255,215,0,0.4); }
.level-high { color: var(--error); border-color: var(--error); box-shadow: 0 0 8px rgba(255,49,49,0.4); }

.ai-status { font-size: 10px; color: #fff; background: rgba(0,0,0,0.4); padding: 4px; border-radius: 6px; display: inline-block; font-weight: bold; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
.signal-big { color: var(--error); text-shadow: 0 0 12px var(--error); }
.signal-small { color: var(--success); text-shadow: 0 0 12px var(--success); }

/* Compact History */
.history-panel { 
    max-height: 95px; overflow-y: auto; font-size: 9px; 
    background: rgba(0, 0, 0, 0.5); border-radius: 12px; margin-top: 8px;
    border: 1px solid rgba(255,255,255,0.05);
}
.history-panel::-webkit-scrollbar { width: 3px; }
.history-panel::-webkit-scrollbar-thumb { background: linear-gradient(#00ff88, #0077ff); border-radius: 10px; }
table { width: 100%; border-collapse: collapse; color: #ddd; }
thead { position: sticky; top: 0; background: #0b0b12; z-index: 10; font-size: 9px; color: #aaa; }
th, td { padding: 5px 2px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: center; font-weight: bold; }

/* Show Bubble Button */
.minimized-bubble {
  position: fixed; top: 12%; right: 15px; width: 45px; height: 45px;
  background: linear-gradient(135deg, #00ff88, #0077ff); border-radius: 50%; display: none;
  align-items: center; justify-content: center; font-weight: 900; z-index: 10000; color: #000;
  box-shadow: 0 0 15px rgba(0, 255, 136, 0.6); cursor: pointer; font-size: 10px;
  animation: pulseGlow 1.5s infinite;
}
@keyframes pulseGlow {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

#fullAnim {
    position: fixed; inset: 0; z-index: 11000; display: none;
    justify-content: center; align-items: center; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(12px); flex-direction: column;
}
.anim-title { font-size: 40px; font-weight: 900; text-transform: uppercase; }
.anim-win { color: var(--success); text-shadow: 0 0 30px var(--success); animation: zoomV18 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
.anim-loss { color: var(--error); text-shadow: 0 0 30px var(--error); animation: shakeV18 0.5s ease-in-out; }
@keyframes zoomV18 { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
@keyframes shakeV18 { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 60%{transform:translateX(10px)} }
</style>
</head>
<body oncontextmenu="return false;">

<!-- BACKGROUND GAME -->
<iframe class="game-background" src="https://bdgwinmy.cc//#/register?invitationCode=8261315097340"></iframe>

<!-- Win/Loss Flash Display -->
<div id="fullAnim">
    <div id="animMsg" class="anim-title">WINNER 🏆</div>
    <p style="color:white; font-size:11px; margin-top:5px; letter-spacing:3px; font-weight: 900;">⚡ PREMIUM SYSTEM V18 ⚡</p>
</div>

<!-- PRECISE CORNERED PANEL -->
<div class="signal-overlay" id="overlay">
  <div class="overlay-header">
    <h3>🚀 MODX PANEL V18</h3>
    <button class="control-btn" onclick="minimizePanel()">🙈 HIDE</button>
  </div>
  <div class="current-signal">
    <div class="p-id" id="pID">🆔 PERIOD: Loading...</div>
    <div id="lvlBadge" class="level-badge level-safe">🟢 LEVEL 1</div>
    <div class="signal-value" id="signal">🔄 WAIT...</div>
    <div class="ai-status" id="pOpps">🎯 OPT NUM: Analyzing...</div>
  </div>
  <div class="history-panel">
    <table>
        <thead>
          <tr>
            <th>📊 PRD</th>
            <th>⚖️ LVL</th>
            <th>🔮 PRED</th>
            <th>🎯 OPP</th>
            <th>🏁 RES</th>
          </tr>
        </thead>
        <tbody id="logs"></tbody>
    </table>
  </div>
</div>

<!-- FLOATING SHOW BUTTON -->
<div class="minimized-bubble" id="bubble" onclick="restorePanel()">👀 SHOW</div>

<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>
<audio id="lossSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

<script>
class HacrrPremiumV18 {
  constructor() {
    this.lastId = null;
    this.savedPrediction = null;
    this.savedOpps = [];
    this.currentLevel = 1;
    this.intervalId = null;
    this.initDrag();
  }

  triggerAnim(isWin) {
    const box = document.getElementById('fullAnim');
    const msg = document.getElementById('animMsg');
    msg.innerText = isWin ? "WINNER 🏆" : "LEVEL UP ☠️";
    msg.className = "anim-title " + (isWin ? "anim-win" : "anim-loss");
    box.style.display = "flex";
    try {
      if(isWin) document.getElementById('winSound').play(); 
      else document.getElementById('lossSound').play();
    } catch(e) {}
    setTimeout(() => { box.style.display = "none"; }, 2500);
  }

  updateLevelUI() {
    const badge = document.getElementById('lvlBadge');
    if(!badge) return;
    badge.className = "level-badge";
    if(this.currentLevel === 1) {
      badge.innerText = "🟢 LEVEL 1";
      badge.classList.add("level-safe");
    } else if(this.currentLevel === 2) {
      badge.innerText = "🟡 LEVEL 2";
      badge.classList.add("level-risky");
    } else {
      badge.innerText = "🔴 LEVEL 3";
      badge.classList.add("level-high");
    }
  }

  async startRealSync() {
    if(this.intervalId) clearInterval(this.intervalId);
    this.intervalId = setInterval(async () => {
      try {
        const res = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json');
        const json = await res.json();
        if(!json.data || !json.data.list || json.data.list.length === 0) return;
        const latest = json.data.list[0];

        if(this.lastId !== latest.issueNumber) {
          const num = parseInt(latest.number);
          const size = num >= 5 ? "BIG" : "SMALL";

          if(this.lastId && this.savedPrediction) {
            // शुद्ध विन और लॉस लॉजिक (प्रेडिक्शन मैच होने पर या OPP नंबर आने पर WIN)
            const isWin = (this.savedPrediction === size) || (this.savedOpps && this.savedOpps.includes(num));
            const actualLevel = this.currentLevel;

            if (isWin) {
              this.triggerAnim(true);
              this.currentLevel = 1;
            } else {
              this.triggerAnim(false);
              this.currentLevel++;
              if(this.currentLevel > 3) this.currentLevel = 1;
            }

            const emojiRes = isWin ? '✅ W' : '❌ L';
            const row = `<tr>
              <td>${this.lastId.slice(-3)}</td>
              <td style="color:var(--gold)">L${actualLevel}</td>
              <td style="color:${this.savedPrediction === 'BIG' ? 'var(--error)' : 'var(--success)'}">${this.savedPrediction}</td>
              <td style="font-size:8px; color:#aaa;">${this.savedOpps.join(",")}</td>
              <td style="color:${isWin?'var(--success)':'var(--error)'};">${emojiRes}</td>
            </tr>`;
            document.getElementById('logs').insertAdjacentHTML('afterbegin', row);
            this.updateLevelUI();
          }

          this.lastId = latest.issueNumber;
          const lastResultStr = (parseInt(latest.number) >= 5) ? "BIG" : "SMALL";

          let nextPrediction = "";
          if (this.currentLevel === 1) {
            const last5 = json.data.list.slice(0, 5).map(x => parseInt(x.number) >= 5 ? "BIG" : "SMALL");
            const bigCount = last5.filter(x => x === "BIG").length;
            nextPrediction = bigCount > 2 ? "BIG" : "SMALL";
          } else {
            nextPrediction = (lastResultStr === "BIG") ? "SMALL" : "BIG";
          }

          this.savedPrediction = nextPrediction;
          this.savedOpps = (this.savedPrediction === "BIG" ? [5,6,2,8,9] : [0,1,7,3,4]).sort(()=>Math.random()-0.5).slice(0,2);
          this.updateLevelUI();
        }

        const nextPeriod = BigInt(latest.issueNumber) + 1n;
        document.getElementById('pID').innerText = "🆔 PERIOD: " + nextPeriod.toString();
        const sigEl = document.getElementById('signal');
        if(this.savedPrediction) {
          sigEl.innerText = this.savedPrediction; // बिंदु हटा दिए गए, सिर्फ साफ़ टेक्स्ट है
          sigEl.className = "signal-value " + (this.savedPrediction === "BIG" ? "signal-big" : "signal-small");
        } else {
          sigEl.innerText = "🔄 SYNC...";
        }
        document.getElementById('pOpps').innerHTML = `🎯 OPT NUM: ${this.savedOpps ? this.savedOpps.join(", ") : "---"}`;
      } catch(e) { console.warn(e); }
    }, 3000);
  }

  initDrag() {
    const el = document.getElementById('overlay');
    if(!el) return;
    let x = 0, y = 0, startX, startY, active = false;
    const start = (e) => {
      if (e.target.closest('.history-panel') || e.target.tagName === 'BUTTON') return;
      active = true;
      const cX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
      const cY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
      startX = cX - x; startY = cY - y;
    };
    const move = (e) => {
      if (!active) return;
      const cX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
      const cY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
      x = cX - startX; y = cY - startY;
      requestAnimationFrame(() => { el.style.transform = `translate3d(${x}px, ${y}px, 0)`; });
    };
    document.addEventListener("mousedown", start);
    document.addEventListener("touchstart", start, {passive: false});
    document.addEventListener("mousemove", move);
    document.addEventListener("touchmove", move, {passive: false});
    document.addEventListener("mouseup", () => active = false);
    document.addEventListener("touchend", () => active = false);
  }
}

const hacrrEngine = new HacrrPremiumV18();
window.addEventListener('load', () => {
  hacrrEngine.startRealSync();
});

function minimizePanel() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('bubble').style.display = 'flex';
}

function restorePanel() {
  document.getElementById('bubble').style.display = 'none';
  document.getElementById('overlay').style.display = 'block';
}
</script>
</body>
</html>
